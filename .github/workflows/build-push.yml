name: Build and Push to GHCR

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'

# Required for pushing to GHCR - overrides repo default if restricted
permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/musallih-backend:latest
            ghcr.io/${{ github.repository_owner }}/musallih-backend:${{ github.sha }}
