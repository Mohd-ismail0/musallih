name: Build and Push to GHCR

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'

# Required for pushing to GHCR - overrides repo default if restricted
permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: image_owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.image_owner.outputs.value }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.image_owner.outputs.value }}/musallih-backend:latest
            ghcr.io/${{ steps.image_owner.outputs.value }}/musallih-backend:${{ github.sha }}
