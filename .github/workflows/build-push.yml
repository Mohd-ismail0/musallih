name: Build and Push to GHCR

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/mohd-ismail0/musallih-backend:latest
            ghcr.io/mohd-ismail0/musallih-backend:${{ github.sha }}
