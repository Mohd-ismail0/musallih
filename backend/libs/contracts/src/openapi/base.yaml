openapi: 3.1.0
info:
  title: Musallih API
  description: Open Islamic Civic Infrastructure Platform
  version: "1.0"

servers:
  - url: /v1
    description: API v1

tags:
  - name: health
    description: Health checks
  - name: public
    description: Public open APIs (no auth)
  - name: identity
    description: Identity and profile (OAuth)
  - name: organization
    description: Organizations (OAuth)
  - name: prayer
    description: Prayer times (public)
  - name: calendar
    description: Hijri calendar (public)
  - name: discovery
    description: Discovery and maps (public)
  - name: services
    description: Services and activities (OAuth)
  - name: requests
    description: Service requests and cases (OAuth)
  - name: ads
    description: Ads campaigns and revenue (OAuth)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
